<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-labelledby="title desc">
  <title>Aksh Portfolio Logo</title>
  <desc>Futuristic monogram logo for Aksh Prajapati portfolio.</desc>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39f2ff"/>
      <stop offset="100%" stop-color="#8b5cff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="480" height="480" rx="80" fill="#070b18"/>
  <circle cx="240" cy="240" r="172" fill="none" stroke="url(#grad)" stroke-width="16" filter="url(#glow)" opacity="0.22"/>
  <path d="M145 330 L210 150 L285 330" fill="none" stroke="url(#grad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M210 210 L330 210 L285 260 L330 330" fill="none" stroke="url(#grad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M145 330 L190 330" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.14"/>
  <path d="M235 150 L275 150" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.2"/>
  <circle cx="240" cy="240" r="6" fill="#ffffff" opacity="0.9"/>
</svg>
